# ============================================================
# Test GitRepo â€” centerionware/kube-gitops-testing
# Commit this file. It has no secrets in it.
# Apply the secret separately (see test-secret-apply.sh).
# ============================================================
apiVersion: kube-gitops.centerionware.app/v1alpha1
kind: GitRepo
metadata:
  name: kube-gitops-testing
  namespace: kube-deploy
spec:
  platform: github
  repo: https://github.com/centerionware/kube-gitops-testing
  gitSecret: kube-gitops-testing-secret

  trigger:
    mode: poll
    pollInterval: 2m

  prPolicy:
    allowedAuthorAssociations:
      - OWNER
      - MEMBER
      - COLLABORATOR
      - CONTRIBUTOR
      - FIRST_TIME_CONTRIBUTOR

  notify:
    onDeploy: true
    onError: true
    onClose: false
    deployTemplate: |
      Preview deployed: {{.URL}}

      Branch: `{{.Branch}}`
      Commit: `{{.SHA}}`
    errorTemplate: |
      Preview deployment failed for `{{.Branch}}`: {{.Error}}

  prDeploy:
    namespace: kube-gitops-testing-previews
    baseDomain: centerionware.com
    ingressHostTemplate: "kube-gitops-testing-pr-{{.PRNumber}}.centerionware.com"
    injectPREnv: true

    ingress:
      enabled: true
      className: cloudflare-tunnel

    run:
      port: 80
      replicas: 1
      command: ["nginx", "-g", "daemon off;"]
      healthCheck:
        path: /
      
